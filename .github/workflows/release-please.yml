name: Release Please

# release-please watches main for Conventional Commits and maintains a
# "release PR" that bumps the version + CHANGELOG.md. Merging that PR creates
# a v* tag and a GitHub Release, which in turn triggers publish-images.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
